services:
  mohkam-scraper:
    build: .
    container_name: mohkam-data-scraper
    restart: unless-stopped
    environment:
      PYTHONPATH: /app/src
      QISTAS_USERNAME: ${QISTAS_USERNAME:-}
      QISTAS_PASSWORD: ${QISTAS_PASSWORD:-}
      MOHKAM_TARGET_HOST_UTILIZATION: ${MOHKAM_TARGET_HOST_UTILIZATION:-0.90}
      MOHKAM_COURT_SHARDS: ${MOHKAM_COURT_SHARDS:-none}
      MOHKAM_MAX_COURT_SHARDS: ${MOHKAM_MAX_COURT_SHARDS:-0}
      MOHKAM_PARENT_SHARDS: ${MOHKAM_PARENT_SHARDS:-1,2,3,6}
      MOHKAM_ALLOW_UNSAFE_SPEED: ${MOHKAM_ALLOW_UNSAFE_SPEED:-false}
      MOHKAM_YEAR_WORKERS: ${MOHKAM_YEAR_WORKERS:-3}
      MOHKAM_DETAIL_CONCURRENCY_PER_YEAR: ${MOHKAM_DETAIL_CONCURRENCY_PER_YEAR:-24}
      MOHKAM_GLOBAL_REQUEST_LIMIT: ${MOHKAM_GLOBAL_REQUEST_LIMIT:-48}
      MOHKAM_MAX_DETAIL_CONCURRENCY: ${MOHKAM_MAX_DETAIL_CONCURRENCY:-128}
      MOHKAM_MIN_REQUEST_DELAY_SECONDS: ${MOHKAM_MIN_REQUEST_DELAY_SECONDS:-0}
      MOHKAM_MAX_REQUEST_DELAY_SECONDS: ${MOHKAM_MAX_REQUEST_DELAY_SECONDS:-0.10}
      MOHKAM_PAGE_DELAY_SECONDS: ${MOHKAM_PAGE_DELAY_SECONDS:-0}
      MOHKAM_YEAR_START_STAGGER_SECONDS: ${MOHKAM_YEAR_START_STAGGER_SECONDS:-0}
      MOHKAM_EMPTY_PAGE_CONFIRMATIONS: ${MOHKAM_EMPTY_PAGE_CONFIRMATIONS:-1}
      MOHKAM_EMPTY_PAGE_RETRY_SECONDS: ${MOHKAM_EMPTY_PAGE_RETRY_SECONDS:-0}
      MOHKAM_UNVERIFIED_EMPTY_PAGE_PAUSE_SECONDS: ${MOHKAM_UNVERIFIED_EMPTY_PAGE_PAUSE_SECONDS:-2}
      MOHKAM_LOGIN_RETRY_PAUSE_SECONDS: ${MOHKAM_LOGIN_RETRY_PAUSE_SECONDS:-60}
    volumes:
      - ./data:/app/data
    command:
      - python
      - -m
      - mohkam_data.supervisor

  monitor:
    build: .
    profiles:
      - tools
    environment:
      PYTHONPATH: /app/src
      QISTAS_USERNAME: ${QISTAS_USERNAME:-}
      QISTAS_PASSWORD: ${QISTAS_PASSWORD:-}
    volumes:
      - ./data:/app/data
    command:
      - python
      - -m
      - mohkam_data.monitor
