services:
  mohkam-scraper:
    build: .
    container_name: mohkam-data-scraper
    restart: unless-stopped
    environment:
      PYTHONPATH: /app/src
      QISTAS_USERNAME: ${QISTAS_USERNAME:-}
      QISTAS_PASSWORD: ${QISTAS_PASSWORD:-}
      MOHKAM_START_YEAR: ${MOHKAM_START_YEAR:-2026}
      MOHKAM_END_YEAR: ${MOHKAM_END_YEAR:-1850}
      MOHKAM_TARGET_HOST_UTILIZATION: ${MOHKAM_TARGET_HOST_UTILIZATION:-0.90}
      MOHKAM_COURT_SHARDS: ${MOHKAM_COURT_SHARDS:-none}
      MOHKAM_MAX_COURT_SHARDS: ${MOHKAM_MAX_COURT_SHARDS:-0}
      MOHKAM_PARENT_SHARDS: ${MOHKAM_PARENT_SHARDS:-1,2,3,6}
      MOHKAM_ALLOW_UNSAFE_SPEED: ${MOHKAM_ALLOW_UNSAFE_SPEED:-true}
      MOHKAM_YEAR_WORKERS: ${MOHKAM_YEAR_WORKERS:-2}
      MOHKAM_INDEX_WORKERS: ${MOHKAM_INDEX_WORKERS:-2}
      MOHKAM_DETAIL_CONCURRENCY_PER_YEAR: ${MOHKAM_DETAIL_CONCURRENCY_PER_YEAR:-24}
      MOHKAM_DETAIL_WORKERS: ${MOHKAM_DETAIL_WORKERS:-24}
      MOHKAM_DETAIL_CLAIM_BATCH_SIZE: ${MOHKAM_DETAIL_CLAIM_BATCH_SIZE:-1}
      MOHKAM_DETAIL_MAX_ATTEMPTS: ${MOHKAM_DETAIL_MAX_ATTEMPTS:-5}
      MOHKAM_DETAIL_IDLE_SLEEP_SECONDS: ${MOHKAM_DETAIL_IDLE_SLEEP_SECONDS:-5}
      MOHKAM_DETAIL_RETRY_BASE_SECONDS: ${MOHKAM_DETAIL_RETRY_BASE_SECONDS:-3}
      MOHKAM_DETAIL_WORKER_LOGIN_STAGGER_SECONDS: ${MOHKAM_DETAIL_WORKER_LOGIN_STAGGER_SECONDS:-0.25}
      MOHKAM_BOOTSTRAP_SEEN_KEYS: ${MOHKAM_BOOTSTRAP_SEEN_KEYS:-true}
      MOHKAM_GLOBAL_REQUEST_LIMIT: ${MOHKAM_GLOBAL_REQUEST_LIMIT:-24}
      MOHKAM_MAX_DETAIL_CONCURRENCY: ${MOHKAM_MAX_DETAIL_CONCURRENCY:-96}
      MOHKAM_MIN_REQUEST_DELAY_SECONDS: ${MOHKAM_MIN_REQUEST_DELAY_SECONDS:-0.05}
      MOHKAM_MAX_REQUEST_DELAY_SECONDS: ${MOHKAM_MAX_REQUEST_DELAY_SECONDS:-0.20}
      MOHKAM_PAGE_DELAY_SECONDS: ${MOHKAM_PAGE_DELAY_SECONDS:-0.1}
      MOHKAM_YEAR_START_STAGGER_SECONDS: ${MOHKAM_YEAR_START_STAGGER_SECONDS:-5}
      MOHKAM_YEAR_COMPLETION_PAGE_CAP: ${MOHKAM_YEAR_COMPLETION_PAGE_CAP:-0}
      MOHKAM_EMPTY_PAGE_CONFIRMATIONS: ${MOHKAM_EMPTY_PAGE_CONFIRMATIONS:-1}
      MOHKAM_EMPTY_PAGE_RETRY_SECONDS: ${MOHKAM_EMPTY_PAGE_RETRY_SECONDS:-0}
      MOHKAM_UNVERIFIED_EMPTY_PAGE_PAUSE_SECONDS: ${MOHKAM_UNVERIFIED_EMPTY_PAGE_PAUSE_SECONDS:-2}
      MOHKAM_UNVERIFIED_EMPTY_PAGE_MAX_RETRIES: ${MOHKAM_UNVERIFIED_EMPTY_PAGE_MAX_RETRIES:-5}
      MOHKAM_RELOGIN_ON_UNVERIFIED_EMPTY: ${MOHKAM_RELOGIN_ON_UNVERIFIED_EMPTY:-true}
      MOHKAM_MAX_RETRIES: ${MOHKAM_MAX_RETRIES:-9}
      MOHKAM_BACKOFF_SECONDS: ${MOHKAM_BACKOFF_SECONDS:-3}
      MOHKAM_CONNECT_TIMEOUT_SECONDS: ${MOHKAM_CONNECT_TIMEOUT_SECONDS:-10}
      MOHKAM_READ_TIMEOUT_SECONDS: ${MOHKAM_READ_TIMEOUT_SECONDS:-45}
      MOHKAM_NETWORK_PAUSE_SECONDS: ${MOHKAM_NETWORK_PAUSE_SECONDS:-45}
      MOHKAM_LOGIN_RETRY_PAUSE_SECONDS: ${MOHKAM_LOGIN_RETRY_PAUSE_SECONDS:-60}
    volumes:
      - ./data:/app/data
    command:
      - python
      - -m
      - mohkam_data.supervisor

  monitor:
    build: .
    profiles:
      - tools
    environment:
      PYTHONPATH: /app/src
      QISTAS_USERNAME: ${QISTAS_USERNAME:-}
      QISTAS_PASSWORD: ${QISTAS_PASSWORD:-}
    volumes:
      - ./data:/app/data
    command:
      - python
      - -m
      - mohkam_data.monitor
